    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            background: linear-gradient(270deg, #020617, #1a0033, #3b0764, #020617);
            background-size: 600% 600%;
            animation: gradientMove 12s ease infinite;
            color: white;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, rgba(236,72,153,0.25), transparent 60%);
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            z-index: 1;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(15px);
        }

        .profile img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #a855f7;
            box-shadow: 0 0 15px #a855f7, 0 0 30px #ec4899;
        }

        h1 {
            margin-top: 10px;
            text-shadow: 0 0 10px #ec4899;
        }

        p {
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(236,72,153,0.4);
            transition: 0.3s;
        }

        .link i {
            font-size: 18px;
        }

        .link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #a855f7, 0 0 30px #ec4899;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.5;
        }

    </style>
</head>
